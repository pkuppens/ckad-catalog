# kind cluster for CKAD practice: 1 control-plane + 2 workers.
# The control-plane maps host ports 80/443 so ingress-nginx is reachable from localhost.
# Generated reference; edit as needed. Docs: https://kind.sigs.k8s.io/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ckad
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
