# Isolate the database: only the API may reach Postgres on 5432 (Domain 5).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-allow-api-only
  namespace: sample
spec:
  podSelector:
    matchLabels:
      app: sample-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: sample-api
      ports:
        - protocol: TCP
          port: 5432
