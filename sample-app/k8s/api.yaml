# Stateless API tier (Domains 2,3,4,5).
# Image is built locally and loaded into kind:
#   docker build -t ckad-sample-api:dev sample-app/api
#   kind load docker-image ckad-sample-api:dev --name ckad
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: sample
  labels:
    app: sample-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ckad-sample-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sample-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: sample
spec:
  selector:
    app: sample-api
  ports:
    - port: 8000
      targetPort: 8000
