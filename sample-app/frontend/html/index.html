<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CKAD sample app</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 3rem auto; max-width: 32rem; }
    button { padding: .5rem 1rem; font-size: 1rem; cursor: pointer; }
    code { background: #eee; padding: .1rem .3rem; border-radius: 4px; }
    #out { margin-top: 1rem; font-size: 1.2rem; }
  </style>
</head>
<body>
  <h1>CKAD sample app</h1>
  <p>The frontend (nginx) proxies <code>/api/</code> to the API service, which
     counts visits in PostgreSQL.</p>
  <button onclick="hit()">Record a visit</button>
  <div id="out">&nbsp;</div>
  <script>
    async function hit() {
      const out = document.getElementById('out');
      try {
        const r = await fetch('/api/');
        const j = await r.json();
        out.textContent = r.ok ? `Visits: ${j.visits}` : `Error: ${j.error}`;
      } catch (e) {
        out.textContent = 'Request failed: ' + e;
      }
    }
  </script>
</body>
</html>
