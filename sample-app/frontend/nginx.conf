# Serve the static frontend and proxy /api/ to the API Service.
# API_HOST defaults to the in-cluster Service name "sample-api".
server {
    listen 8080;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Strip the /api prefix when forwarding to the API.
    location /api/ {
        proxy_pass http://sample-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
