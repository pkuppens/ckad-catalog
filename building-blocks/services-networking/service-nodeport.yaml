# Domain 5 (Services/Networking): NodePort — exposes the Service on a static port on every node.
# nodePort range is 30000-32767.
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: ckad
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
