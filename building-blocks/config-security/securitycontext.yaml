# Domain 4 (Config/Security): SecurityContext at pod and container level.
# Runs as a non-root user, drops all Linux capabilities, read-only root filesystem.
apiVersion: v1
kind: Pod
metadata:
  name: securitycontext-demo
  namespace: ckad
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "id; sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
