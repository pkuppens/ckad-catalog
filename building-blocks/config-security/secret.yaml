# Domain 4 (Config/Security): Secret consumed as env var and as a mounted file.
# PLACEHOLDER VALUES ONLY — never commit real secrets.
# stringData takes plain text (auto base64-encoded by the API server).
# Generate: kubectl create secret generic app-secret --from-literal=DB_PASSWORD=changeme --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: ckad
type: Opaque
stringData:
  DB_PASSWORD: "changeme-placeholder"
  api-token: "placeholder-token"
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer
  namespace: ckad
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "echo env has DB_PASSWORD set: ${DB_PASSWORD:+yes}; ls -l /etc/secret; sleep 3600"]
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
      volumeMounts:
        - name: sec
          mountPath: /etc/secret
          readOnly: true
  volumes:
    - name: sec
      secret:
        secretName: app-secret
