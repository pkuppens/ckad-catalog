# Domain 4 (Config/Security): a dedicated ServiceAccount, used by a Pod.
# AuthZ note: bind a Role/RoleBinding to this SA to grant in-cluster API permissions (RBAC).
# Generate: kubectl create serviceaccount app-sa --dry-run=client -o yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: ckad
automountServiceAccountToken: false
---
apiVersion: v1
kind: Pod
metadata:
  name: sa-consumer
  namespace: ckad
spec:
  serviceAccountName: app-sa
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "sleep 3600"]
