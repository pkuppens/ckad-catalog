# Domain 1 (Design/Build): a CronJob creates Jobs on a schedule.
# concurrencyPolicy + history limits are common exam tweaks.
# Generate: kubectl create cronjob hello --image=busybox:1.36 --schedule="*/1 * * * *" --dry-run=client -o yaml -- /bin/sh -c "date; echo hello"
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
  namespace: ckad
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: hello
              image: busybox:1.36
              command: ["/bin/sh", "-c", "date; echo hello from the cronjob"]
