# Domain 1 (Design/Build): init containers run to completion, in order, BEFORE app containers.
# Used for setup/wait-for-dependency patterns. Shared data via a volume.
apiVersion: v1
kind: Pod
metadata:
  name: web-with-init
  namespace: ckad
  labels:
    app: web-with-init
spec:
  initContainers:
    - name: fetch-content
      image: busybox:1.36
      command: ["/bin/sh", "-c", "echo '<h1>Hello from init</h1>' > /work/index.html"]
      volumeMounts:
        - name: content
          mountPath: /work
  containers:
    - name: web
      image: nginx:1.27
      ports:
        - containerPort: 80
      volumeMounts:
        - name: content
          mountPath: /usr/share/nginx/html
  volumes:
    - name: content
      emptyDir: {}
